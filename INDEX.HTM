function pass(){
            var password = document.getElementById("inputPassword").value;
                if(password.length<6){
                    alert("输入的密码必须大于六位")
                    return;}
                    else{
                        var count =0
                        for (var i=0;i<password.length;i++) {
                            if((password[i]>='a' && password[i]<='z')||(password[i]>='A' && password[i]<='Z')){
                                count++;
                            }
                        }
                        if(count>=2){
                            //alert("输入合法")
                        }else{
                            alert("密码必须含有两位字母两位字母")
                        }
                    }
            }


 function pass_chk(o) {
    var len = o.length;
    var pattern = /^.*(?=.{8,})(?=.*\d)(?=.*[A-Z])(?=.*[a-z])(?=.*[!@#$%^&*? ]).*$/; // Regular expression
if(len <= 8){
    if(!pattern.test(o.value)) {
        //alert('Length size is 8 and only contain [A-Z][a-z][!@#$%^&*? ]');
       // o.innerHTML="ength size is 8 and only contain [A-Z][a-z][!@#$%^&*? ]";
        document.querySelectorAll('.msg').forEach(element => { element.textContent = 'Length size is 8 and  contain [A-Z][a-z][!@#$%^&*? ]'; });
    //	o.value = o.value.substring(0, (o.value.length-1));
       return false;
    }
    else
    {
     document.querySelectorAll('.msg').forEach(element => { element.style.display = 'none'; });
      return true;
    }
  }
